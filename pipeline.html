<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appello — Pipeline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./shared.css">
    <style>
        .board {
            display: flex;
            gap: 16px;
            padding: 24px;
            overflow-x: auto;
            min-height: calc(100vh - 76px);
            align-items: flex-start;
        }

        .column {
            min-width: 280px;
            max-width: 320px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .column-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 4px;
        }

        .column-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .column-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-secondary);
        }

        .column-count {
            font-size: 11px;
            font-weight: 600;
            background: var(--bg);
            color: var(--text-muted);
            padding: 1px 7px;
            border-radius: 10px;
            margin-left: auto;
        }

        .pipe-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            cursor: pointer;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .pipe-card:hover {
            border-color: var(--accent);
            box-shadow: 0 2px 8px rgba(37,99,235,0.08);
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.35;
        }

        .card-desc {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.45;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .card-tag {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }

        .tag-ticket { background: #dbeafe; color: #1e40af; }
        .tag-pr-open { background: var(--warning-light); color: var(--warning-text); }
        .tag-pr-merged { background: var(--success-light); color: var(--success-text); }
        .tag-pr-closed { background: var(--danger-light); color: var(--danger-text); }
        .tag-feedback { background: #f3e8ff; color: #6b21a8; }

        .card-links {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #f1f5f9;
        }

        .card-link {
            font-size: 11px;
            font-weight: 500;
            color: var(--accent);
            text-decoration: none;
        }

        .card-link:hover { text-decoration: underline; }

        .card-expanded {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #f1f5f9;
            display: none;
        }

        .pipe-card.open .card-expanded { display: block; }

        .detail-section { margin-bottom: 10px; }

        .detail-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .detail-item {
            font-size: 12px;
            color: var(--text-primary);
            padding: 4px 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .detail-item a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .detail-item a:hover { text-decoration: underline; }

        .detail-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="app-header" data-full-width></div>

    <div class="board" id="board">
        <div class="loading">Loading pipeline...</div>
    </div>

    <script src="./feedback-config.js"></script>
    <script src="./shared.js"></script>
    <script src="./pipeline.js"></script>
</body>
</html>
