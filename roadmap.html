<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appello — Roadmap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./shared.css">
    <link rel="stylesheet" href="./roadmap.css">
</head>
<body>
    <div id="app-header" data-full-width></div>

    <div class="toolbar">
        <label for="filter-release">Release</label>
        <select id="filter-release">
            <option value="">All Releases</option>
        </select>

        <div class="sep"></div>

        <label for="filter-status">Status</label>
        <select id="filter-status">
            <option value="">All Statuses</option>
        </select>
    </div>

    <div class="gantt-wrapper">
        <div id="gantt-container">
            <div class="loading">Loading roadmap...</div>
        </div>
    </div>

    <div class="gantt-tooltip" id="gantt-tooltip"></div>

    <script src="./feedback-config.js"></script>
    <script src="./shared.js"></script>
    <script src="./roadmap.js"></script>
</body>
</html>
