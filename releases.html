<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appello — Releases</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./shared.css">
    <style>
        .release-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .release-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: border-color 0.15s;
        }

        .release-card:hover {
            border-color: var(--accent);
        }

        .release-info { flex: 1; }

        .release-info h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .release-info .meta {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            gap: 16px;
        }

        .release-badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .release-actions {
            display: flex;
            gap: 6px;
        }
    </style>
</head>
<body>
    <div id="app-header"></div>

    <main class="app-content">
        <div class="app-container">
            <div class="page-header-row">
                <div class="page-header">
                    <h2>Releases</h2>
                    <p>Manage release milestones for the product roadmap.</p>
                </div>
                <button class="btn btn-primary" id="btn-new-release">New Release</button>
            </div>

            <div class="release-list" id="release-list">
                <div class="loading">Loading releases...</div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h3 id="modal-title">New Release</h3>
            <div class="form-group">
                <label for="rel-name">Name</label>
                <input id="rel-name" type="text" placeholder='e.g. "v1.33" or "Q2 2026"'>
            </div>
            <div class="form-group">
                <label for="rel-desc">Description</label>
                <textarea id="rel-desc" placeholder="What's included in this release?"></textarea>
            </div>
            <div class="form-group">
                <label for="rel-target-date">Target Date</label>
                <input id="rel-target-date" type="date">
            </div>
            <div class="form-group">
                <label for="rel-actual-date">Actual Date</label>
                <input id="rel-actual-date" type="date">
            </div>
            <div class="form-group">
                <label for="rel-status">Status</label>
                <select id="rel-status">
                    <option value="planned">Planned</option>
                    <option value="active">Active</option>
                    <option value="released">Released</option>
                </select>
            </div>
            <div class="form-group">
                <label for="rel-sort">Sort Order</label>
                <input id="rel-sort" type="number" value="0" min="0">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="btn-cancel">Cancel</button>
                <button class="btn btn-primary" id="btn-save">Save</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="./feedback-config.js"></script>
    <script src="./shared.js"></script>
    <script>
    (function () {
        var cfg = window.FEEDBACK_CONFIG;
        if (!cfg) return;

        var API = cfg.supabaseUrl + "/rest/v1";
        var headersRead = {
            apikey: cfg.supabaseKey,
            Authorization: "Bearer " + cfg.supabaseKey
        };
        var headersWrite = {
            apikey: cfg.supabaseKey,
            Authorization: "Bearer " + cfg.supabaseKey,
            "Content-Type": "application/json",
            Prefer: "return=representation"
        };

        var releases = [];
        var editingId = null;

        function esc(s) {
            var d = document.createElement("div");
            d.textContent = s || "";
            return d.innerHTML;
        }

        function toast(msg, ok) {
            var el = document.getElementById("toast");
            el.textContent = msg;
            el.className = "toast " + (ok ? "ok" : "err");
            setTimeout(function () { el.className = "toast"; }, 3000);
        }

        function formatDate(s) {
            if (!s) return "\u2014";
            var d = new Date(s + "T00:00:00");
            return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
        }

        function loadReleases() {
            fetch(API + "/releases?select=*&order=sort_order.asc,target_date.asc", { headers: headersRead })
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    releases = Array.isArray(data) ? data : [];
                    renderList();
                })
                .catch(function () {
                    document.getElementById("release-list").innerHTML =
                        '<div class="loading">Failed to load releases.</div>';
                });
        }

        function renderList() {
            var list = document.getElementById("release-list");
            if (releases.length === 0) {
                list.innerHTML =
                    '<div class="empty-state">' +
                    '<h3>No releases yet</h3>' +
                    '<p>Create a release milestone to start organizing your roadmap.</p>' +
                    '</div>';
                return;
            }

            list.innerHTML = releases.map(function (rel) {
                var badgeClass = "release-badge badge-" + rel.status;
                var statusLabel = { planned: "Planned", active: "Active", released: "Released" }[rel.status] || rel.status;
                return '<div class="release-card" data-id="' + esc(rel.id) + '">' +
                    '<div class="release-info">' +
                    '<h3>' + esc(rel.name) + '</h3>' +
                    '<div class="meta">' +
                    '<span>Target: ' + formatDate(rel.target_date) + '</span>' +
                    (rel.actual_date ? '<span>Actual: ' + formatDate(rel.actual_date) + '</span>' : '') +
                    '<span>Order: ' + (rel.sort_order || 0) + '</span>' +
                    '</div>' +
                    '</div>' +
                    '<span class="' + badgeClass + '">' + esc(statusLabel) + '</span>' +
                    '<div class="release-actions">' +
                    '<button class="btn btn-sm btn-secondary btn-edit" data-id="' + esc(rel.id) + '">Edit</button>' +
                    '<button class="btn btn-sm btn-danger btn-delete" data-id="' + esc(rel.id) + '">Delete</button>' +
                    '</div>' +
                    '</div>';
            }).join("");

            list.querySelectorAll(".btn-edit").forEach(function (btn) {
                btn.addEventListener("click", function () { openEdit(btn.dataset.id); });
            });

            list.querySelectorAll(".btn-delete").forEach(function (btn) {
                btn.addEventListener("click", function () { deleteRelease(btn.dataset.id); });
            });
        }

        function openModal(title) {
            document.getElementById("modal-title").textContent = title;
            document.getElementById("modal-overlay").classList.add("visible");
        }

        function closeModal() {
            document.getElementById("modal-overlay").classList.remove("visible");
            editingId = null;
            document.getElementById("rel-name").value = "";
            document.getElementById("rel-desc").value = "";
            document.getElementById("rel-target-date").value = "";
            document.getElementById("rel-actual-date").value = "";
            document.getElementById("rel-status").value = "planned";
            document.getElementById("rel-sort").value = "0";
        }

        function openNew() {
            editingId = null;
            openModal("New Release");
        }

        function openEdit(id) {
            var rel = releases.find(function (r) { return r.id === id; });
            if (!rel) return;
            editingId = id;
            document.getElementById("rel-name").value = rel.name;
            document.getElementById("rel-desc").value = rel.description || "";
            document.getElementById("rel-target-date").value = rel.target_date || "";
            document.getElementById("rel-actual-date").value = rel.actual_date || "";
            document.getElementById("rel-status").value = rel.status || "planned";
            document.getElementById("rel-sort").value = rel.sort_order || 0;
            openModal("Edit Release");
        }

        function saveRelease() {
            var name = document.getElementById("rel-name").value.trim();
            if (!name) { toast("Name is required", false); return; }

            var body = {
                name: name,
                description: document.getElementById("rel-desc").value.trim(),
                target_date: document.getElementById("rel-target-date").value || null,
                actual_date: document.getElementById("rel-actual-date").value || null,
                status: document.getElementById("rel-status").value,
                sort_order: parseInt(document.getElementById("rel-sort").value) || 0,
                updated_at: new Date().toISOString()
            };

            var url = editingId
                ? API + "/releases?id=eq." + editingId
                : API + "/releases";
            var method = editingId ? "PATCH" : "POST";

            fetch(url, {
                method: method,
                headers: headersWrite,
                body: JSON.stringify(body)
            })
            .then(function (r) {
                if (!r.ok) throw new Error();
                closeModal();
                toast(editingId ? "Release updated" : "Release created", true);
                loadReleases();
            })
            .catch(function () { toast("Failed to save release", false); });
        }

        function deleteRelease(id) {
            if (!confirm("Delete this release? Work packages will be unassigned but not deleted.")) return;

            fetch(API + "/releases?id=eq." + id, {
                method: "DELETE",
                headers: headersWrite
            })
            .then(function (r) {
                if (!r.ok) throw new Error();
                toast("Release deleted", true);
                loadReleases();
            })
            .catch(function () { toast("Failed to delete release", false); });
        }

        document.getElementById("btn-new-release").addEventListener("click", openNew);
        document.getElementById("btn-cancel").addEventListener("click", closeModal);
        document.getElementById("btn-save").addEventListener("click", saveRelease);
        document.getElementById("modal-overlay").addEventListener("click", function (e) {
            if (e.target === this) closeModal();
        });

        loadReleases();
    })();
    </script>
</body>
</html>
