<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appello — Work Packages</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./shared.css">
    <style>
        .doc-grid {
            display: grid;
            gap: 16px;
        }

        .doc-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .doc-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .doc-icon {
            width: 48px;
            height: 48px;
            background: var(--accent-light);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 20px;
        }

        .doc-info { flex: 1; min-width: 0; }

        .doc-info h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .doc-info p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .doc-meta {
            margin-left: auto;
            text-align: right;
            flex-shrink: 0;
        }

        .doc-meta .date {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .doc-meta .badge { margin-top: 4px; }
    </style>
</head>
<body>
    <div id="app-header"></div>

    <main class="app-content">
        <div class="app-container">
            <div class="page-header">
                <h2>Work Packages</h2>
                <p>Review and approve work packages shared by your Appello team.</p>
            </div>

            <div class="doc-grid" id="doc-list">
                <div class="loading">Loading work packages...</div>
            </div>
        </div>
    </main>

    <footer class="app-footer">
        <div class="app-container">&copy; 2026 Appello. All rights reserved.</div>
    </footer>

    <script src="./feedback-config.js"></script>
    <script src="./shared.js"></script>
    <script>
    (function () {
        var cfg = window.FEEDBACK_CONFIG;
        if (!cfg) return;

        var API = cfg.supabaseUrl + "/rest/v1";
        var headers = {
            apikey: cfg.supabaseKey,
            Authorization: "Bearer " + cfg.supabaseKey
        };

        var STATUS_LABELS = {
            draft: "Draft",
            pending_review: "Pending Review",
            needs_changes: "Needs Changes",
            approved: "Approved",
            in_development: "In Development",
            in_review: "In Review",
            deployed: "Deployed"
        };

        var DOC_ICON = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:24px;height:24px;color:#2563eb"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" /></svg>';

        function formatDate(iso) {
            var d = new Date(iso);
            return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
        }

        function esc(s) {
            var d = document.createElement("div");
            d.textContent = s;
            return d.innerHTML;
        }

        function renderCards(packages) {
            var grid = document.getElementById("doc-list");
            if (!packages.length) {
                grid.innerHTML = '<div class="empty-state"><h3>No work packages yet</h3><p>Work packages will appear here once created.</p></div>';
                return;
            }
            grid.innerHTML = packages.map(function (wp) {
                var statusLabel = STATUS_LABELS[wp.status] || wp.status;
                var badgeClass = "badge badge-" + wp.status;
                var href = wp.spec_url || ("./docs/" + wp.slug + ".html");
                return '<a href="' + esc(href) + '" class="doc-card">' +
                    '<div class="doc-icon">' + DOC_ICON + '</div>' +
                    '<div class="doc-info">' +
                        '<h3>' + esc(wp.title) + '</h3>' +
                        '<p>' + esc(wp.description) + '</p>' +
                    '</div>' +
                    '<div class="doc-meta">' +
                        '<div class="date">' + formatDate(wp.created_at) + '</div>' +
                        '<div class="' + badgeClass + '">' + esc(statusLabel) + '</div>' +
                    '</div>' +
                '</a>';
            }).join("");
        }

        fetch(API + "/work_packages?select=*&order=created_at.desc", { headers: headers })
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (Array.isArray(data)) {
                    renderCards(data);
                } else {
                    renderFallback();
                }
            })
            .catch(function () { renderFallback(); });

        function renderFallback() {
            var grid = document.getElementById("doc-list");
            grid.innerHTML =
                '<a href="./docs/safety-incident-management.html" class="doc-card">' +
                    '<div class="doc-icon">' + DOC_ICON + '</div>' +
                    '<div class="doc-info"><h3>Safety & Incident Management</h3><p>Comprehensive safety incident tracking, OSHA compliance, investigation workflows</p></div>' +
                    '<div class="doc-meta"><div class="date">Mar 11, 2026</div><div class="badge badge-pending_review">Pending Review</div></div>' +
                '</a>' +
                '<a href="./docs/personnel-qr-codes.html" class="doc-card">' +
                    '<div class="doc-icon">' + DOC_ICON + '</div>' +
                    '<div class="doc-info"><h3>Personnel QR Codes</h3><p>Scannable QR stickers for personnel showing certifications, emergency contacts</p></div>' +
                    '<div class="doc-meta"><div class="date">Mar 11, 2026</div><div class="badge badge-pending_review">Pending Review</div></div>' +
                '</a>';
        }
    })();
    </script>
</body>
</html>
