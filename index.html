<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appello — Work Packages</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./shared.css">
    <style>
        .doc-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .wp-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .wp-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .wp-row-top {
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }

        .wp-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .wp-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
            line-height: 1.4;
        }

        .wp-left {
            flex: 1;
            min-width: 0;
        }

        .wp-right {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .wp-date {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .wp-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .wp-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 5px;
            white-space: nowrap;
            line-height: 1.4;
        }

        .wp-tag svg {
            width: 11px;
            height: 11px;
            flex-shrink: 0;
            display: inline-block;
            vertical-align: middle;
        }

        .tag-jira { background: #ede9fe; color: #5b21b6; }
        .tag-pr-open { background: #dbeafe; color: #1e40af; }
        .tag-pr-merged { background: #d1fae5; color: #065f46; }
        .tag-customer { background: #fef3c7; color: #92400e; }
        .tag-rice-high { background: #dcfce7; color: #166534; }
        .tag-rice-med { background: #fef3c7; color: #92400e; }
        .tag-rice-low { background: #fee2e2; color: #991b1b; }
        .tag-fb { background: #fce7f3; color: #9d174d; }

        .wp-links {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .wp-links a {
            font-size: 11px;
            font-weight: 500;
            text-decoration: none;
            padding: 1px 6px;
            border-radius: 4px;
            transition: background 0.15s;
        }

        .wp-links .jira-link {
            color: #5b21b6;
            background: #f5f3ff;
        }
        .wp-links .jira-link:hover { background: #ede9fe; }

        .wp-links .pr-link {
            color: #1e40af;
            background: #eff6ff;
        }
        .wp-links .pr-link:hover { background: #dbeafe; }

        .wp-links .pr-link.merged { color: #065f46; background: #f0fdf4; }
        .wp-links .pr-link.merged:hover { background: #dcfce7; }

        .wp-links .link-sep {
            width: 1px;
            height: 12px;
            background: var(--border);
            flex-shrink: 0;
        }

        .wp-rice-detail {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
            display: flex;
            gap: 12px;
        }

        .filter-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-bar label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .filter-bar select {
            font-family: inherit;
            font-size: 13px;
            padding: 7px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--text-primary);
            outline: none;
            cursor: pointer;
        }

        .filter-bar select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .stats-row {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 20px;
            flex: 1;
            min-width: 100px;
        }

        .stat-card .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .stat-card .stat-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div id="app-header"></div>

    <main class="app-content">
        <div class="app-container">
            <div class="page-header">
                <h2>Work Packages</h2>
                <p>Review and approve work packages shared by your Appello team.</p>
            </div>

            <div class="stats-row" id="stats-row" style="display:none"></div>

            <div class="filter-bar" id="filter-bar" style="display:none">
                <label>Status</label>
                <select id="filter-status">
                    <option value="">All</option>
                    <option value="draft">Draft</option>
                    <option value="pending_review">Pending Review</option>
                    <option value="needs_changes">Needs Changes</option>
                    <option value="approved">Approved</option>
                    <option value="in_development">In Development</option>
                    <option value="in_review">In Review</option>
                    <option value="deployed">Deployed</option>
                </select>
                <label>Sort</label>
                <select id="sort-by">
                    <option value="created_at">Date Created</option>
                    <option value="rice">RICE Score</option>
                    <option value="priority">Priority</option>
                    <option value="title">Title</option>
                </select>
            </div>

            <div class="doc-grid" id="doc-list">
                <div class="loading">Loading work packages...</div>
            </div>
        </div>
    </main>

    <footer class="app-footer">
        <div class="app-container">&copy; 2026 Appello. All rights reserved.</div>
    </footer>

    <script src="./feedback-config.js"></script>
    <script src="./shared.js"></script>
    <script>
    (function () {
        var cfg = window.FEEDBACK_CONFIG;
        if (!cfg) return;

        var API = cfg.supabaseUrl + "/rest/v1";
        var hdrs = {
            apikey: cfg.supabaseKey,
            Authorization: "Bearer " + cfg.supabaseKey
        };

        var STATUS_LABELS = {
            draft: "Draft",
            pending_review: "Pending Review",
            needs_changes: "Needs Changes",
            approved: "Approved",
            in_development: "In Development",
            in_review: "In Review",
            deployed: "Deployed"
        };

        var allPackages = [];
        var allTickets = [];
        var allPrs = [];
        var allFeedback = [];

        function formatDate(iso) {
            return new Date(iso).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
        }

        function esc(s) {
            var d = document.createElement("div");
            d.textContent = s || "";
            return d.innerHTML;
        }

        function calcRice(wp) {
            var r = +wp.rice_reach, i = +wp.rice_impact, c = +wp.rice_confidence, e = +wp.rice_effort;
            if (!r && !i && !c) return null;
            if (!e) return null;
            return (r * i * (c / 100)) / e;
        }

        function groupBy(arr, key) {
            var map = {};
            (arr || []).forEach(function (item) {
                var k = item[key];
                if (!map[k]) map[k] = [];
                map[k].push(item);
            });
            return map;
        }

        function svg(name) {
            var icons = {
                ticket: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 6v.75m0 3v.75m0 3v.75m0 3V18m-9-5.25h5.25M7.5 15h3M3.375 5.25c-.621 0-1.125.504-1.125 1.125v3.026a2.999 2.999 0 0 1 0 5.198v3.026c0 .621.504 1.125 1.125 1.125h17.25c.621 0 1.125-.504 1.125-1.125v-3.026a2.999 2.999 0 0 1 0-5.198V6.375c0-.621-.504-1.125-1.125-1.125H3.375Z"/></svg>',
                pr: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21 3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/></svg>',
                customer: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z"/></svg>',
                rice: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z"/></svg>',
                feedback: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 8.25h9m-9 3H12m-9.75 1.51c0 1.6 1.123 2.994 2.707 3.227 1.129.166 2.27.293 3.423.379.35.026.67.21.865.501L12 21l2.755-4.133a1.14 1.14 0 0 1 .865-.501 48.172 48.172 0 0 0 3.423-.379c1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0 0 12 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018Z"/></svg>'
            };
            return icons[name] || "";
        }

        function renderStats(packages) {
            var row = document.getElementById("stats-row");
            var total = packages.length;
            var byStatus = groupBy(packages, "status");
            var active = (byStatus.in_development || []).length + (byStatus.in_review || []).length;
            var pending = (byStatus.pending_review || []).length + (byStatus.needs_changes || []).length;
            var deployed = (byStatus.deployed || []).length;
            var withRice = packages.filter(function (wp) { return calcRice(wp) != null; }).length;

            row.style.display = "";
            row.innerHTML =
                '<div class="stat-card"><div class="stat-value">' + total + '</div><div class="stat-label">Total</div></div>' +
                '<div class="stat-card"><div class="stat-value">' + pending + '</div><div class="stat-label">Awaiting Review</div></div>' +
                '<div class="stat-card"><div class="stat-value">' + active + '</div><div class="stat-label">In Progress</div></div>' +
                '<div class="stat-card"><div class="stat-value">' + deployed + '</div><div class="stat-label">Deployed</div></div>' +
                '<div class="stat-card"><div class="stat-value">' + withRice + '/' + total + '</div><div class="stat-label">RICE Scored</div></div>';
        }

        function renderCards() {
            var statusFilter = document.getElementById("filter-status").value;
            var sortBy = document.getElementById("sort-by").value;
            var ticketsByWp = groupBy(allTickets, "work_package_id");
            var prsByWp = groupBy(allPrs, "work_package_id");
            var feedbackBySlug = groupBy(allFeedback, "document_slug");

            var filtered = allPackages.filter(function (wp) {
                return !statusFilter || wp.status === statusFilter;
            });

            if (sortBy === "rice") {
                filtered.sort(function (a, b) {
                    var ra = calcRice(a), rb = calcRice(b);
                    if (ra == null && rb == null) return 0;
                    if (ra == null) return 1;
                    if (rb == null) return -1;
                    return rb - ra;
                });
            } else if (sortBy === "priority") {
                filtered.sort(function (a, b) { return (b.priority || 0) - (a.priority || 0); });
            } else if (sortBy === "title") {
                filtered.sort(function (a, b) { return (a.title || "").localeCompare(b.title || ""); });
            }

            var grid = document.getElementById("doc-list");
            if (!filtered.length) {
                grid.innerHTML = '<div class="empty-state"><h3>No work packages found</h3><p>Try adjusting your filters.</p></div>';
                return;
            }

            grid.innerHTML = filtered.map(function (wp) {
                var statusLabel = STATUS_LABELS[wp.status] || wp.status;
                var href = wp.spec_url || ("./docs/" + wp.slug + ".html");
                var wpTickets = ticketsByWp[wp.id] || [];
                var wpPrs = prsByWp[wp.id] || [];
                var wpFb = feedbackBySlug[wp.slug] || [];
                var pendingFb = wpFb.filter(function (f) { return !f.is_addressed; });
                var prOpen = wpPrs.filter(function (p) { return p.pr_status === "open"; }).length;
                var prMerged = wpPrs.filter(function (p) { return p.pr_status === "merged"; }).length;
                var rice = calcRice(wp);

                var tags = "";
                if (wpTickets.length) tags += '<span class="wp-tag tag-jira">' + svg("ticket") + ' ' + wpTickets.length + " ticket" + (wpTickets.length > 1 ? "s" : "") + '</span>';
                if (prOpen) tags += '<span class="wp-tag tag-pr-open">' + svg("pr") + ' ' + prOpen + " PR open</span>";
                if (prMerged) tags += '<span class="wp-tag tag-pr-merged">' + svg("pr") + ' ' + prMerged + " merged</span>";
                var customers = wp.customer_sources || [];
                if (customers.length) tags += '<span class="wp-tag tag-customer">' + svg("customer") + ' ' + esc(customers.join(", ")) + "</span>";
                if (rice != null) {
                    var rcls = rice >= 5 ? "tag-rice-high" : rice >= 2 ? "tag-rice-med" : "tag-rice-low";
                    tags += '<span class="wp-tag ' + rcls + '">' + svg("rice") + ' RICE ' + rice.toFixed(1) + "</span>";
                }
                if (pendingFb.length) tags += '<span class="wp-tag tag-fb">' + svg("feedback") + ' ' + pendingFb.length + " feedback</span>";

                var links = "";
                if (wpTickets.length || wpPrs.length) {
                    var items = "";
                    wpTickets.forEach(function (t) {
                        items += '<a class="jira-link" href="' + esc(t.jira_url) + '" target="_blank" onclick="event.stopPropagation();event.preventDefault();window.open(this.href)">' + esc(t.jira_key) + "</a>";
                    });
                    if (wpTickets.length && wpPrs.length) items += '<span class="link-sep"></span>';
                    wpPrs.forEach(function (p) {
                        var cls = p.pr_status === "merged" ? " merged" : "";
                        items += '<a class="pr-link' + cls + '" href="' + esc(p.pr_url) + '" target="_blank" onclick="event.stopPropagation();event.preventDefault();window.open(this.href)">#' + p.pr_number + "</a>";
                    });
                    links = '<div class="wp-links">' + items + "</div>";
                }

                var riceDetail = "";
                if (rice != null) {
                    riceDetail = '<div class="wp-rice-detail">' +
                        "<span>R: " + wp.rice_reach + "</span>" +
                        "<span>I: " + Number(wp.rice_impact).toFixed(1) + "</span>" +
                        "<span>C: " + wp.rice_confidence + "%</span>" +
                        "<span>E: " + Number(wp.rice_effort).toFixed(1) + "</span>" +
                    "</div>";
                }

                return '<a href="' + esc(href) + '" class="wp-card">' +
                    '<div class="wp-row-top">' +
                        '<div class="wp-left">' +
                            '<div class="wp-title">' + esc(wp.title) + "</div>" +
                            '<div class="wp-desc">' + esc(wp.description) + "</div>" +
                        "</div>" +
                        '<div class="wp-right">' +
                            '<span class="wp-date">' + formatDate(wp.created_at) + "</span>" +
                            '<span class="badge badge-' + wp.status + '">' + esc(statusLabel) + "</span>" +
                        "</div>" +
                    "</div>" +
                    (tags ? '<div class="wp-tags">' + tags + "</div>" : "") +
                    links +
                    riceDetail +
                "</a>";
            }).join("");
        }

        function loadAll() {
            return Promise.all([
                fetch(API + "/work_packages?select=*&order=created_at.desc", { headers: hdrs }).then(function (r) { return r.json(); }),
                fetch(API + "/work_package_tickets?select=*&order=created_at.asc", { headers: hdrs }).then(function (r) { return r.json(); }),
                fetch(API + "/work_package_prs?select=*&order=created_at.asc", { headers: hdrs }).then(function (r) { return r.json(); }),
                fetch(API + "/feedback?select=*&order=created_at.desc", { headers: hdrs }).then(function (r) { return r.json(); })
            ]);
        }

        loadAll()
            .then(function (results) {
                allPackages = Array.isArray(results[0]) ? results[0] : [];
                allTickets = Array.isArray(results[1]) ? results[1] : [];
                allPrs = Array.isArray(results[2]) ? results[2] : [];
                allFeedback = Array.isArray(results[3]) ? results[3] : [];

                if (!allPackages.length) { renderFallback(); return; }

                document.getElementById("filter-bar").style.display = "";
                renderStats(allPackages);
                renderCards();

                document.getElementById("filter-status").addEventListener("change", renderCards);
                document.getElementById("sort-by").addEventListener("change", renderCards);
            })
            .catch(function () { renderFallback(); });

        function renderFallback() {
            document.getElementById("doc-list").innerHTML =
                '<a href="./docs/safety-incident-management.html" class="wp-card"><div class="wp-row-top"><div class="wp-left"><div class="wp-title">Safety & Incident Management</div><div class="wp-desc">Comprehensive safety incident tracking, OSHA compliance, investigation workflows</div></div><div class="wp-right"><span class="wp-date">Mar 11, 2026</span><span class="badge badge-pending_review">Pending Review</span></div></div></a>' +
                '<a href="./docs/personnel-qr-codes.html" class="wp-card"><div class="wp-row-top"><div class="wp-left"><div class="wp-title">Personnel QR Codes</div><div class="wp-desc">Scannable QR stickers for personnel showing certifications, emergency contacts</div></div><div class="wp-right"><span class="wp-date">Mar 11, 2026</span><span class="badge badge-pending_review">Pending Review</span></div></div></a>';
        }
    })();
    </script>
</body>
</html>
