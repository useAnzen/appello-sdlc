<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appello — Work Packages</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafbfc;
            --surface: #ffffff;
            --border: #e2e6ea;
            --text-primary: #1a2332;
            --text-secondary: #5a6577;
            --accent: #2563eb;
            --accent-light: #eff4ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 24px 0;
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
        }

        .brand h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .brand span {
            color: var(--text-secondary);
            font-weight: 400;
            font-size: 14px;
            margin-left: 8px;
        }

        .nav-links {
            display: flex;
            gap: 8px;
        }

        .nav-link {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 6px;
            transition: all 0.15s;
        }

        .nav-link:hover {
            background: var(--accent-light);
            color: var(--accent);
        }

        .nav-link.active {
            background: var(--accent-light);
            color: var(--accent);
        }

        .content {
            padding: 48px 0;
        }

        .intro {
            margin-bottom: 40px;
        }

        .intro h2 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .intro p {
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.6;
        }

        .doc-grid {
            display: grid;
            gap: 16px;
        }

        .doc-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .doc-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .doc-icon {
            width: 48px;
            height: 48px;
            background: var(--accent-light);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 20px;
        }

        .doc-info {
            flex: 1;
            min-width: 0;
        }

        .doc-info h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .doc-info p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .doc-meta {
            margin-left: auto;
            text-align: right;
            flex-shrink: 0;
        }

        .doc-meta .date {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .doc-meta .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 6px;
            margin-top: 4px;
        }

        .badge-draft { background: #f1f5f9; color: #475569; }
        .badge-pending_review { background: #fef3c7; color: #92400e; }
        .badge-needs_changes { background: #fee2e2; color: #991b1b; }
        .badge-approved { background: #d1fae5; color: #065f46; }
        .badge-in_development { background: #dbeafe; color: #1e40af; }
        .badge-in_review { background: #ede9fe; color: #5b21b6; }
        .badge-deployed { background: #d1fae5; color: #065f46; }

        .loading-spinner {
            text-align: center;
            padding: 60px 24px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 80px 24px;
            color: var(--text-secondary);
        }

        .empty-state h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .footer {
            border-top: 1px solid var(--border);
            padding: 24px 0;
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-inner">
                <div class="brand">
                    <div class="brand-icon">A</div>
                    <h1>Appello <span>Work Packages</span></h1>
                </div>
                <nav class="nav-links">
                    <a href="./" class="nav-link active">Work Packages</a>
                    <a href="./pipeline.html" class="nav-link">Pipeline</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="content">
        <div class="container">
            <div class="intro">
                <h2>Work Packages</h2>
                <p>Review and approve work packages shared by your Appello team.</p>
            </div>

            <div class="doc-grid" id="doc-list">
                <div class="loading-spinner">Loading work packages...</div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            &copy; 2026 Appello. All rights reserved.
        </div>
    </footer>

    <script src="./feedback-config.js"></script>
    <script>
    (function () {
        var cfg = window.FEEDBACK_CONFIG;
        if (!cfg) return;

        var API = cfg.supabaseUrl + "/rest/v1";
        var headers = {
            apikey: cfg.supabaseKey,
            Authorization: "Bearer " + cfg.supabaseKey
        };

        var STATUS_LABELS = {
            draft: "Draft",
            pending_review: "Pending Review",
            needs_changes: "Needs Changes",
            approved: "Approved",
            in_development: "In Development",
            in_review: "In Review",
            deployed: "Deployed"
        };

        var DOC_ICON = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:24px;height:24px;color:#2563eb"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" /></svg>';

        function formatDate(iso) {
            var d = new Date(iso);
            return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
        }

        function esc(s) {
            var d = document.createElement("div");
            d.textContent = s;
            return d.innerHTML;
        }

        function renderCards(packages) {
            var grid = document.getElementById("doc-list");
            if (!packages.length) {
                grid.innerHTML = '<div class="empty-state"><h3>No work packages yet</h3><p>Work packages will appear here once created.</p></div>';
                return;
            }
            grid.innerHTML = packages.map(function (wp) {
                var statusLabel = STATUS_LABELS[wp.status] || wp.status;
                var badgeClass = "badge badge-" + wp.status;
                return '<a href="' + esc(wp.spec_url) + '" class="doc-card">' +
                    '<div class="doc-icon">' + DOC_ICON + '</div>' +
                    '<div class="doc-info">' +
                        '<h3>' + esc(wp.title) + '</h3>' +
                        '<p>' + esc(wp.description) + '</p>' +
                    '</div>' +
                    '<div class="doc-meta">' +
                        '<div class="date">' + formatDate(wp.created_at) + '</div>' +
                        '<div class="' + badgeClass + '">' + esc(statusLabel) + '</div>' +
                    '</div>' +
                '</a>';
            }).join("");
        }

        fetch(API + "/work_packages?select=*&order=created_at.desc", { headers: headers })
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (Array.isArray(data)) {
                    renderCards(data);
                } else {
                    renderFallback();
                }
            })
            .catch(function () {
                renderFallback();
            });

        function renderFallback() {
            var grid = document.getElementById("doc-list");
            grid.innerHTML =
                '<a href="./docs/safety-incident-management.html" class="doc-card">' +
                    '<div class="doc-icon">' + DOC_ICON + '</div>' +
                    '<div class="doc-info"><h3>Safety & Incident Management — Design Specification</h3><p>Comprehensive safety incident tracking, OSHA compliance, investigation workflows, and corrective actions</p></div>' +
                    '<div class="doc-meta"><div class="date">Mar 11, 2026</div><div class="badge badge-pending_review">Pending Review</div></div>' +
                '</a>' +
                '<a href="./docs/personnel-qr-codes.html" class="doc-card">' +
                    '<div class="doc-icon">' + DOC_ICON + '</div>' +
                    '<div class="doc-info"><h3>Personnel QR Codes — Design Specification</h3><p>Scannable QR stickers for personnel showing certifications, emergency contacts, and compliance status</p></div>' +
                    '<div class="doc-meta"><div class="date">Mar 11, 2026</div><div class="badge badge-pending_review">Pending Review</div></div>' +
                '</a>';
        }
    })();
    </script>
</body>
</html>
